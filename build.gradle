plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
}

repositories {
    maven { url = "https://maven.terraformersmc.com/releases/" }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.minecraft_version}+build.1:v2"
    loader "net.fabricmc:fabric-loader:${project.fabric_loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
    
    // Подключаем API Фигуры, чтобы наши миксины видели её классы
    modCompileOnly "org.figuramc:figura-fabric:0.1.4+1.21.1" 
}

tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
java { sourceCompatibility = JavaVersion.VERSION_21 }
