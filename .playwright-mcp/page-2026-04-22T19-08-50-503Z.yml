                    - img [ref=e756]
                - blockquote [ref=e758]:
                  - paragraph [ref=e759]: Since some shaders do not support emissives, a compatibility setting (default on) will change the render type of emissive textures to render them at it were fullbright, however that can lead to some unintended results
                  - paragraph [ref=e760]:
                    - text: You can force your avatar to use the correct emissive render type by using the render type
                    - code [ref=e761]: EYES
                    - text: on your model
                - generic [ref=e762]:
                  - heading "• How can I use Figura with OptiFine?" [level=3] [ref=e763]
