                    - /url: "#-what-are-pings-and-how-do-i-use-them"
                    - img [ref=e718]
                - blockquote [ref=e720]:
                  - paragraph [ref=e721]: Pings are Lua functions that are executed for everyone running your avatar's script
                  - paragraph [ref=e722]: Pings are sent from the host player, and can be used to sync things like keypresses or action wheel actions
                  - paragraph [ref=e723]: "To create a ping:"
                  - generic [ref=e724]:
                    - generic [ref=e725]:
                      - text: function pings.myPing(arg1, arg2)
                      - generic [ref=e726]: "-- code to run once the ping is called"
                      - text: end
                    - button "Copy" [ref=e728] [cursor=pointer]:
                      - img [ref=e729]
                  - paragraph [ref=e732]: "And to execute the ping, it's as simple as calling a lua function:"
                  - generic [ref=e733]:
                    - generic [ref=e734]:
                      - text: pings.myPing(
                      - generic [ref=e735]: "\"Hello\""
                      - text: ","
                      - generic [ref=e736]: "\"World\""
                      - text: )
                    - button "Copy" [ref=e738] [cursor=pointer]:
                      - img [ref=e739]
                  - paragraph [ref=e742]: Note that pings are limited in their content and size, and are rate-limited
                - generic [ref=e743]:
                  - heading "• How can I add an emissive texture?" [level=3] [ref=e744]
                  - 'link "Permalink: • How can I add an emissive texture?" [ref=e745] [cursor=pointer]':
                    - /url: "#-how-can-i-add-an-emissive-texture"
                    - img [ref=e746]
                - blockquote [ref=e748]:
                  - paragraph [ref=e749]:
                    - text: Name the texture the same as the non-emissive counterpart, then add
                    - code [ref=e750]: _e
                    - text: to the end
                  - paragraph [ref=e751]:
                    - text: And don't forget to set the places you don't want to glow to
                    - strong [ref=e752]: transparent black
                    - text: (#00000000), to also ensure compatibility with shader mods
                - generic [ref=e753]:
                  - heading "• My emissives doesn't glow, nor have bloom with Iris/OptiFine shaders?" [level=3] [ref=e754]
                  - 'link "Permalink: • My emissives doesn''t glow, nor have bloom with Iris/OptiFine shaders?" [ref=e755] [cursor=pointer]':
